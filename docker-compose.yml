services:
  web:
    build: .
    container_name: leo-web
    ports:
      - "3003:3000"
    environment:
      DATABASE_URL: postgresql://leoangelo:leopass@db:5432/leoangelo
      DIRECT_URL: postgresql://leoangelo:leopass@db:5432/leoangelo
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3003}
      AUTH_SECRET: ${NEXTAUTH_SECRET}
      AUTH_URL: ${NEXTAUTH_URL:-http://localhost:3003}
      AUTH_TRUST_HOST: "1"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16
    container_name: leo-db
    environment:
      POSTGRES_DB: leoangelo
      POSTGRES_USER: leoangelo
      POSTGRES_PASSWORD: leopass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leoangelo -d leoangelo"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: leo-pgadmin
    ports:
      - "8083:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@leoangelo.co.th
      PGADMIN_DEFAULT_PASSWORD: leopass
    depends_on:
      - db
    restart: unless-stopped

volumes:
  postgres_data:
