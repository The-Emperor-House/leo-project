services:
  web:
    build: .
    container_name: leo-web
    ports:
      - "3003:3000"
    environment:
      DATABASE_URL: mysql://leoangelo:leopass@db:3306/leoangelo
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3003}
      AUTH_SECRET: ${NEXTAUTH_SECRET}
      AUTH_URL: ${NEXTAUTH_URL:-http://localhost:3003}
      AUTH_TRUST_HOST: "1"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: mysql:8.0
    container_name: leo-db
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: leoangelo
      MYSQL_USER: leoangelo
      MYSQL_PASSWORD: leopass
    ports:
      - "3309:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpass"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: leo-pma
    ports:
      - "8083:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: rootpass
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mysql_data:
